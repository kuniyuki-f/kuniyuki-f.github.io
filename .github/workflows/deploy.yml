name: Deploy to GitHub Pages

on:
  # mainブランチへのプッシュ時に自動デプロイ
  push:
    branches: [ main ]
  # 手動デプロイも可能
  workflow_dispatch:

# GitHub Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイを1つに制限（進行中のデプロイをキャンセルしない）
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: pnpm のセットアップ
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'pnpm'

      - name: GitHub Pages の設定を取得
        uses: actions/configure-pages@v4

      - name: 依存パッケージのインストール
        run: pnpm install --frozen-lockfile

      # site URL はカスタムドメイン（web-studio-swing.com, base '/'）を
      # astro.config.mjs にハードコード済みのため、環境変数での上書きは不要
      - name: Astro ビルド
        run: pnpm run build

      - name: ビルド成果物をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
